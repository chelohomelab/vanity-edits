<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Setup – The Vanity Edit</title>
  <link rel="manifest" href="/static/manifest.json"/>
  <meta name="theme-color" content="#d4b896"/>
  <link rel="apple-touch-icon" href="/static/logo.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="The Vanity Edit"/>
  <link rel="icon" type="image/png" href="/static/logo.png"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #fdf5f7;
      background-image: url('/static/backgrounds/phone.jpeg');
      background-size: cover;
      background-position: center;
    }
    @media (min-width: 769px) {
      body {
        background-image: url('/static/backgrounds/pc.jpeg');
      }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white/90 backdrop-blur-lg rounded-3xl shadow-2xl p-8 w-full max-w-sm border border-white/50">
    <div class="text-center mb-8">
      <img src="/static/logo.png" alt="The Vanity Edit" class="w-24 h-24 mx-auto rounded-2xl shadow-lg mb-4"/>
      <h1 class="text-3xl font-semibold tracking-wide" style="font-family:'Playfair Display',serif; color:#8e2545;">The Vanity Edit</h1>
      <p class="text-gray-400 text-sm mt-3 tracking-wider uppercase" style="letter-spacing:0.15em;">Create your account</p>
    </div>

    {% if request.query_params.get('error') %}
    <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-3 py-2 mb-4">{{ request.query_params.get('error') }}</div>
    {% endif %}

    <form method="post" action="/setup" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Username</label>
        <input type="text" name="username" required autofocus
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 focus:border-transparent bg-white/80"/>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-500 mb-1 uppercase tracking-wider">Password</label>
        <input type="password" name="password" required minlength="8"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 focus:border-transparent bg-white/80"/>
        <p class="text-xs text-gray-400 mt-1">Minimum 8 characters</p>
      </div>
      <button type="submit"
        class="w-full py-2.5 rounded-xl text-white font-medium transition shadow-md hover:shadow-lg"
        style="background: linear-gradient(135deg, #e05a7e, #ab2a50);">
        Create Account
      </button>
    </form>
  </div>
</body>
</html>
