<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}The Vanity Edit{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.json"/>
  <meta name="theme-color" content="#d4b896"/>
  <link rel="apple-touch-icon" href="/static/logo.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="The Vanity Edit"/>
  <link rel="icon" type="image/png" href="/static/logo.png"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vanity: {
              50:  '#fdf5f7',
              100: '#fceaee',
              200: '#f9d5de',
              300: '#f4b0c2',
              400: '#ec85a0',
              500: '#e05a7e',
              600: '#cb3862',
              700: '#ab2a50',
              800: '#8e2545',
              900: '#78223d',
            }
          },
          fontFamily: {
            display: ['"Playfair Display"', 'Georgia', 'serif'],
            body: ['"Inter"', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .toast { position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999; }

    .bg-page {
      background-color: #fdf5f7;
      background-image: url('/static/backgrounds/pc.jpeg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    @media (max-width: 768px) {
      .bg-page {
        background-image: url('/static/backgrounds/phone.jpeg');
      }
    }

    .glass {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .badge-new      { background:#dcfce7; color:#166534; }
    .badge-open     { background:#dbeafe; color:#1e40af; }
    .badge-finished { background:#f3f4f6; color:#6b7280; }

    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }

    /* Bottom nav for mobile */
    @media (min-width: 769px) { .mobile-nav { display: none; } }
    @media (max-width: 768px) {
      .desktop-nav { display: none; }
      .mobile-nav { display: flex; }
      main { padding-bottom: 5rem; }
    }
  </style>
</head>
<body class="bg-page min-h-screen">

<!-- Desktop Navbar -->
<nav class="desktop-nav glass border-b border-vanity-200 shadow-sm">
  <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-14">
    <a href="/" class="flex items-center gap-2 hover:opacity-80 transition">
      <img src="/static/logo.png" alt="The Vanity Edit" class="w-9 h-9 rounded-lg"/>
      <span class="font-display text-xl text-vanity-800 tracking-wide">The Vanity Edit</span>
    </a>
    <div class="flex items-center gap-1 text-sm">
      <a href="/" class="px-3 py-1.5 rounded-full hover:bg-vanity-100 transition text-vanity-700 {% if request.url.path == '/' %}bg-vanity-100 font-medium{% endif %}">Home</a>
      <a href="/collection/makeup" class="px-3 py-1.5 rounded-full hover:bg-vanity-100 transition text-vanity-700 {% if '/collection/makeup' in request.url.path %}bg-vanity-100 font-medium{% endif %}">Makeup</a>
      <a href="/collection/perfume" class="px-3 py-1.5 rounded-full hover:bg-vanity-100 transition text-vanity-700 {% if '/collection/perfume' in request.url.path %}bg-vanity-100 font-medium{% endif %}">Perfumes</a>
      <a href="/collection/nail_polish" class="px-3 py-1.5 rounded-full hover:bg-vanity-100 transition text-vanity-700 {% if '/collection/nail_polish' in request.url.path %}bg-vanity-100 font-medium{% endif %}">Nail Polish</a>
      {% if user and user.is_admin %}
      <div class="relative group ml-1">
        <button class="px-3 py-1.5 rounded-full hover:bg-vanity-100 transition text-vanity-700 flex items-center gap-1 text-sm">Admin &#9662;</button>
        <div class="absolute right-0 top-full mt-1 bg-white rounded-xl shadow-lg min-w-40 hidden group-hover:block z-50 border border-vanity-100 overflow-hidden">
          <a href="/admin/users" class="block px-4 py-2.5 hover:bg-vanity-50 text-sm text-gray-700">Users</a>
          <a href="/admin/trash" class="block px-4 py-2.5 hover:bg-vanity-50 text-sm text-gray-700">Trash</a>
        </div>
      </div>
      {% endif %}
      <form method="post" action="/logout" class="ml-2">
        <button type="submit" class="px-3 py-1.5 rounded-full bg-vanity-100 hover:bg-vanity-200 transition text-vanity-700 text-sm">Logout</button>
      </form>
    </div>
  </div>
</nav>

<!-- Mobile Top Bar -->
<div class="mobile-nav glass border-b border-vanity-200 shadow-sm px-4 h-14 items-center justify-between">
  <a href="/" class="flex items-center gap-2">
    <img src="/static/logo.png" alt="The Vanity Edit" class="w-8 h-8 rounded-lg"/>
    <span class="font-display text-lg text-vanity-800 tracking-wide">The Vanity Edit</span>
  </a>
  <div class="flex items-center gap-2">
    {% if user and user.is_admin %}
    <a href="/admin/users" class="text-vanity-600 text-sm">Admin</a>
    {% endif %}
    <form method="post" action="/logout">
      <button type="submit" class="text-vanity-600 text-sm">Logout</button>
    </form>
  </div>
</div>

<!-- Mobile Bottom Nav -->
<nav class="mobile-nav fixed bottom-0 left-0 right-0 glass border-t border-vanity-200 z-50 justify-around items-center h-16 px-2">
  <a href="/" class="flex flex-col items-center gap-0.5 py-1 px-2 {% if request.url.path == '/' %}text-vanity-600{% else %}text-gray-400{% endif %}">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    <span class="text-[10px]">Home</span>
  </a>
  <a href="/collection/makeup" class="flex flex-col items-center gap-0.5 py-1 px-2 {% if '/collection/makeup' in request.url.path %}text-vanity-600{% else %}text-gray-400{% endif %}">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.53 16.122a3 3 0 00-5.78 1.128 2.25 2.25 0 01-2.4 2.245 4.5 4.5 0 008.4-2.245c0-.399-.078-.78-.22-1.128zm0 0a15.998 15.998 0 003.388-1.62m-5.043-.025a15.994 15.994 0 011.622-3.395m3.42 3.42a15.995 15.995 0 004.764-4.648l3.876-5.814a1.151 1.151 0 00-1.597-1.597L14.146 6.32a15.996 15.996 0 00-4.649 4.763m3.42 3.42a6.776 6.776 0 00-3.42-3.42"/></svg>
    <span class="text-[10px]">Makeup</span>
  </a>
  <a href="/collection/perfume" class="flex flex-col items-center gap-0.5 py-1 px-2 {% if '/collection/perfume' in request.url.path %}text-vanity-600{% else %}text-gray-400{% endif %}">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19 14.5M14.25 3.104c.251.023.501.05.75.082M19 14.5a2.25 2.25 0 010 3.182l-2.06 2.06a2.25 2.25 0 01-3.182 0L12 17.984l-1.758 1.758a2.25 2.25 0 01-3.182 0L5 17.682a2.25 2.25 0 010-3.182"/></svg>
    <span class="text-[10px]">Perfumes</span>
  </a>
  <a href="/collection/nail_polish" class="flex flex-col items-center gap-0.5 py-1 px-2 {% if '/collection/nail_polish' in request.url.path %}text-vanity-600{% else %}text-gray-400{% endif %}">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z"/></svg>
    <span class="text-[10px]">Nails</span>
  </a>
</nav>

<!-- Toast -->
<div id="toast-container" class="toast flex flex-col gap-2"></div>

<main class="max-w-6xl mx-auto px-4 py-6">
  {% block content %}{% endblock %}
</main>

<script>
function showToast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  const colors = type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-vanity-600';
  t.className = `${colors} text-white px-4 py-2 rounded-xl shadow-lg text-sm max-w-xs`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

async function apiFetch(url, opts={}) {
  const r = await fetch(url, {credentials:'same-origin', ...opts});
  if (!r.ok) {
    const err = await r.json().catch(() => ({detail: 'Request failed'}));
    throw new Error(err.detail || r.statusText);
  }
  return r.json().catch(() => null);
}
</script>

{% block scripts %}{% endblock %}
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(() => {});
}
</script>
</body>
</html>
